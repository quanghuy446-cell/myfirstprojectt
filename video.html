<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #fcfcfc; 
            margin: 0;
            padding: 40px 20px;
            text-align: center;
        }

        .video-title {
            color: #b88b8b; 
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 30px;
            display: inline-block;
            padding-bottom: 15px;
            position: relative;
        }

        .video-title::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 25%;
            width: 50%;
            height: 1px;
            background-color: #e0e0e0;
        }

        .video-container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.02);
            border: 1px solid #f2e7e7;
        }

        .iframe-responsive {
            position: relative;
            overflow: hidden;
            width: 100%;
            padding-top: 56.25%;
        }

        .iframe-responsive iframe {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 12px;
        }

        .video-description {
            margin-top: 25px;
            color: #888888;
            line-height: 1.8;
            font-weight: 300;
            font-size: 1.05rem;
        }

        .video-description b {
            color: #b88b8b;
            font-weight: 400;
        }
    </style>
</head>
<body>

    <h2 class="video-title">Giai điệu ngày Xuân</h2>

    <div class="video-container">
        <div class="iframe-responsive">
            <iframe 
                src="chuttet.mp4" 
                title="Video Chúc Tết" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>
        
        <div class="video-description">
            <p>Ông thần tài chút tết nè. <br> 
        
        </div>
    </div>

</body>
</html>
